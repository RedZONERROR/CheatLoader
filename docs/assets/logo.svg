<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Main Icon - Code Brackets with Loader -->
  <g transform="translate(100, 100)">
    <!-- Left Bracket -->
    <path d="M -50 -40 L -70 -40 L -70 40 L -50 40" 
          stroke="url(#grad1)" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Right Bracket -->
    <path d="M 50 -40 L 70 -40 L 70 40 L 50 40" 
          stroke="url(#grad1)" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Center Loader Symbol -->
    <circle cx="0" cy="-15" r="6" fill="url(#grad2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="url(#grad2)">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="15" r="6" fill="url(#grad2)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Connecting Lines -->
    <line x1="-40" y1="-15" x2="-10" y2="-15" stroke="url(#grad2)" stroke-width="3" opacity="0.6"/>
    <line x1="10" y1="-15" x2="40" y2="-15" stroke="url(#grad2)" stroke-width="3" opacity="0.6"/>
    <line x1="-40" y1="15" x2="-10" y2="15" stroke="url(#grad2)" stroke-width="3" opacity="0.6"/>
    <line x1="10" y1="15" x2="40" y2="15" stroke="url(#grad2)" stroke-width="3" opacity="0.6"/>
  </g>
  
  <!-- Outer Glow Effect -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
</svg>
